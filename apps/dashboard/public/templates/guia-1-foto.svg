<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <title>Guia de Moldura — 1 Foto (1280×720)</title>

  <!-- Background — área de decoração -->
  <rect width="1280" height="720" fill="#1a1a2e"/>

  <!-- Photo slot — área transparente no arquivo final -->
  <rect x="40" y="40" width="1200" height="640" fill="#2d2d44" rx="8"/>
  <!-- Checkerboard pattern para indicar área transparente -->
  <pattern id="checker" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <rect width="10" height="10" fill="#3a3a55"/>
    <rect x="10" y="10" width="10" height="10" fill="#3a3a55"/>
    <rect x="10" y="0" width="10" height="10" fill="#2d2d44"/>
    <rect x="0" y="10" width="10" height="10" fill="#2d2d44"/>
  </pattern>
  <rect x="40" y="40" width="1200" height="640" fill="url(#checker)" rx="8"/>

  <!-- Photo slot border -->
  <rect x="40" y="40" width="1200" height="640" fill="none" stroke="#6c6cff" stroke-width="2" stroke-dasharray="12 6" rx="8"/>

  <!-- Center label -->
  <text x="640" y="345" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="28" font-weight="bold">ÁREA DA FOTO</text>
  <text x="640" y="385" text-anchor="middle" fill="#6060aa" font-family="Arial, sans-serif" font-size="18">1200 × 640 px (transparente no arquivo final)</text>

  <!-- Dimension guides -->
  <line x1="0" y1="360" x2="35" y2="360" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="1245" y1="360" x2="1280" y2="360" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="20" y="355" text-anchor="middle" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="11" transform="rotate(-90,20,355)">DECORAÇÃO (40px)</text>

  <!-- Corner marks -->
  <g stroke="#ff6b6b" stroke-width="1.5" fill="none">
    <path d="M0,0 L30,0 M0,0 L0,30"/>
    <path d="M1280,0 L1250,0 M1280,0 L1280,30"/>
    <path d="M0,720 L30,720 M0,720 L0,690"/>
    <path d="M1280,720 L1250,720 M1280,720 L1280,690"/>
  </g>

  <!-- Title block -->
  <rect x="0" y="0" width="280" height="36" fill="#6c6cff" opacity="0.9"/>
  <text x="10" y="24" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Photobooth — Moldura 1 Foto</text>
  <rect x="1000" y="0" width="280" height="36" fill="#2d2d44" opacity="0.9"/>
  <text x="1140" y="24" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="13">1280 × 720 px · 16:9</text>
</svg>
