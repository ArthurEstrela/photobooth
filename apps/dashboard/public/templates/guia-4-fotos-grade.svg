<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" width="1280" height="720">
  <title>Guia de Moldura — 4 Fotos Grade 2×2 (2560×1440)</title>

  <rect width="2560" height="1440" fill="#1a1a2e"/>

  <pattern id="checker" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <rect width="10" height="10" fill="#3a3a55"/>
    <rect x="10" y="10" width="10" height="10" fill="#3a3a55"/>
    <rect x="10" y="0" width="10" height="10" fill="#2d2d44"/>
    <rect x="0" y="10" width="10" height="10" fill="#2d2d44"/>
  </pattern>

  <!-- Photo slot 1 — top left -->
  <rect x="40" y="40" width="1220" height="680" fill="url(#checker)" rx="8"/>
  <rect x="40" y="40" width="1220" height="680" fill="none" stroke="#6c6cff" stroke-width="2" stroke-dasharray="12 6" rx="8"/>
  <text x="650" y="375" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="36" font-weight="bold">FOTO 1</text>

  <!-- Photo slot 2 — top right -->
  <rect x="1300" y="40" width="1220" height="680" fill="url(#checker)" rx="8"/>
  <rect x="1300" y="40" width="1220" height="680" fill="none" stroke="#6c6cff" stroke-width="2" stroke-dasharray="12 6" rx="8"/>
  <text x="1910" y="375" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="36" font-weight="bold">FOTO 2</text>

  <!-- Photo slot 3 — bottom left -->
  <rect x="40" y="760" width="1220" height="640" fill="url(#checker)" rx="8"/>
  <rect x="40" y="760" width="1220" height="640" fill="none" stroke="#6c6cff" stroke-width="2" stroke-dasharray="12 6" rx="8"/>
  <text x="650" y="1075" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="36" font-weight="bold">FOTO 3</text>

  <!-- Photo slot 4 — bottom right -->
  <rect x="1300" y="760" width="1220" height="640" fill="url(#checker)" rx="8"/>
  <rect x="1300" y="760" width="1220" height="640" fill="none" stroke="#6c6cff" stroke-width="2" stroke-dasharray="12 6" rx="8"/>
  <text x="1910" y="1075" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="36" font-weight="bold">FOTO 4</text>

  <!-- Gap lines -->
  <line x1="1260" y1="0" x2="1260" y2="1440" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="8 6" opacity="0.4"/>
  <line x1="0" y1="720" x2="2560" y2="720" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="8 6" opacity="0.4"/>

  <!-- Corner marks -->
  <g stroke="#ff6b6b" stroke-width="2" fill="none">
    <path d="M0,0 L40,0 M0,0 L0,40"/>
    <path d="M2560,0 L2520,0 M2560,0 L2560,40"/>
    <path d="M0,1440 L40,1440 M0,1440 L0,1400"/>
    <path d="M2560,1440 L2520,1440 M2560,1440 L2560,1400"/>
  </g>

  <!-- Title -->
  <rect x="0" y="0" width="370" height="36" fill="#6c6cff" opacity="0.9"/>
  <text x="10" y="24" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Photobooth — Moldura 4 Fotos Grade 2×2</text>
  <rect x="2210" y="0" width="350" height="36" fill="#2d2d44" opacity="0.9"/>
  <text x="2385" y="24" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="13">2560 × 1440 px · 16:9</text>
</svg>
