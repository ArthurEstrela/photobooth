<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 2880" width="320" height="720">
  <title>Guia de Moldura — 4 Fotos Tira 1×4 (1280×2880)</title>

  <rect width="1280" height="2880" fill="#1a1a2e"/>

  <pattern id="checker" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <rect width="10" height="10" fill="#3a3a55"/>
    <rect x="10" y="10" width="10" height="10" fill="#3a3a55"/>
    <rect x="10" y="0" width="10" height="10" fill="#2d2d44"/>
    <rect x="0" y="10" width="10" height="10" fill="#2d2d44"/>
  </pattern>

  <!-- Photo slot 1 -->
  <rect x="40" y="40" width="1200" height="640" fill="url(#checker)" rx="8"/>
  <rect x="40" y="40" width="1200" height="640" fill="none" stroke="#6c6cff" stroke-width="2" stroke-dasharray="12 6" rx="8"/>
  <text x="640" y="345" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="32" font-weight="bold">FOTO 1</text>
  <text x="640" y="390" text-anchor="middle" fill="#6060aa" font-family="Arial, sans-serif" font-size="18">1200 × 640 px</text>

  <!-- Gap 1 -->
  <rect x="0" y="680" width="1280" height="40" fill="#1a1a2e"/>
  <text x="640" y="706" text-anchor="middle" fill="#5050aa" font-family="Arial, sans-serif" font-size="13">espaço para decoração</text>

  <!-- Photo slot 2 -->
  <rect x="40" y="720" width="1200" height="640" fill="url(#checker)" rx="8"/>
  <rect x="40" y="720" width="1200" height="640" fill="none" stroke="#6c6cff" stroke-width="2" stroke-dasharray="12 6" rx="8"/>
  <text x="640" y="1025" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="32" font-weight="bold">FOTO 2</text>

  <!-- Gap 2 -->
  <rect x="0" y="1360" width="1280" height="40" fill="#1a1a2e"/>
  <text x="640" y="1386" text-anchor="middle" fill="#5050aa" font-family="Arial, sans-serif" font-size="13">espaço para decoração</text>

  <!-- Photo slot 3 -->
  <rect x="40" y="1400" width="1200" height="640" fill="url(#checker)" rx="8"/>
  <rect x="40" y="1400" width="1200" height="640" fill="none" stroke="#6c6cff" stroke-width="2" stroke-dasharray="12 6" rx="8"/>
  <text x="640" y="1705" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="32" font-weight="bold">FOTO 3</text>

  <!-- Gap 3 -->
  <rect x="0" y="2040" width="1280" height="40" fill="#1a1a2e"/>
  <text x="640" y="2066" text-anchor="middle" fill="#5050aa" font-family="Arial, sans-serif" font-size="13">espaço para decoração</text>

  <!-- Photo slot 4 -->
  <rect x="40" y="2080" width="1200" height="640" fill="url(#checker)" rx="8"/>
  <rect x="40" y="2080" width="1200" height="640" fill="none" stroke="#6c6cff" stroke-width="2" stroke-dasharray="12 6" rx="8"/>
  <text x="640" y="2385" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="32" font-weight="bold">FOTO 4</text>

  <!-- Bottom decoration area -->
  <rect x="0" y="2720" width="1280" height="160" fill="#1a1a2e"/>
  <text x="640" y="2810" text-anchor="middle" fill="#5050aa" font-family="Arial, sans-serif" font-size="16">área inferior para logo / texto</text>

  <!-- Corner marks -->
  <g stroke="#ff6b6b" stroke-width="2" fill="none">
    <path d="M0,0 L40,0 M0,0 L0,40"/>
    <path d="M1280,0 L1240,0 M1280,0 L1280,40"/>
    <path d="M0,2880 L40,2880 M0,2880 L0,2840"/>
    <path d="M1280,2880 L1240,2880 M1280,2880 L1280,2840"/>
  </g>

  <!-- Title -->
  <rect x="0" y="0" width="360" height="36" fill="#ff7c4d" opacity="0.9"/>
  <text x="10" y="24" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Photobooth — Moldura 4 Fotos Tira 1×4</text>
  <rect x="920" y="0" width="360" height="36" fill="#2d2d44" opacity="0.9"/>
  <text x="1100" y="24" text-anchor="middle" fill="#9090cc" font-family="Arial, sans-serif" font-size="13">1280 × 2880 px · 4:9 (tira clássica)</text>
</svg>
